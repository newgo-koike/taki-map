<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
<title>日本の滝マップ｜小池雄悟</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<style>
  :root {
    --bg: #0f1419;
    --panel: #1a2028;
    --panel-2: #232b36;
    --text: #e8edf2;
    --text-dim: #8a96a6;
    --accent: #ff5252;
    --accent-2: #ff8a80;
    --gray: #6b7785;
    --border: #2c3540;
    --ok: #5fd17a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; background: var(--bg); color: var(--text); }
  #app { display: flex; flex-direction: column; height: 100vh; }

  header.topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px; background: var(--panel);
    border-bottom: 1px solid var(--border); z-index: 1000;
  }
  .title-block h1 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: 0.02em; }
  .title-block .sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .stats { display: flex; gap: 16px; align-items: center; }
  .stat { text-align: right; }
  .stat .num { font-size: 22px; font-weight: 700; color: var(--accent); line-height: 1; }
  .stat .num.total { color: var(--text); }
  .stat .lbl { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
  .progress-bar { width: 160px; height: 6px; background: var(--panel-2); border-radius: 3px; overflow: hidden; }
  .progress-bar .fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); transition: width 0.4s ease; }

  .controls {
    display: flex; gap: 8px; padding: 8px 20px;
    background: var(--panel-2); border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  .filter-btn {
    background: transparent; border: 1px solid var(--border); color: var(--text-dim);
    padding: 6px 14px; border-radius: 16px; font-size: 12px; cursor: pointer;
    white-space: nowrap; transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

  #map { flex: 1; background: var(--panel); }

  /* ピンスタイル */
  .pin {
    width: 22px; height: 22px; border-radius: 50%;
    border: 3px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 11px; font-weight: 700;
  }
  .pin.visited { background: var(--accent); }
  .pin.unvisited { background: var(--gray); opacity: 0.7; }
  .pin.unvisited:hover { opacity: 1; transform: scale(1.15); }
  .pin.visited:hover { transform: scale(1.15); }

  /* ポップアップ */
  .leaflet-popup-content-wrapper {
    background: var(--panel); color: var(--text);
    border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .leaflet-popup-tip { background: var(--panel); }
  .leaflet-popup-content { margin: 14px 16px; min-width: 220px; }
  .pop-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .pop-pref { font-size: 11px; color: var(--text-dim); margin-bottom: 10px; }
  .pop-status { display: inline-block; padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; margin-bottom: 10px; }
  .pop-status.visited { background: var(--accent); color: #fff; }
  .pop-status.unvisited { background: var(--panel-2); color: var(--text-dim); }
  .pop-date { font-size: 11px; color: var(--ok); margin-bottom: 10px; }
  .pop-img { width: 100%; max-height: 140px; object-fit: cover; border-radius: 6px; margin-bottom: 10px; }
  .pop-link {
    display: block; text-align: center; padding: 8px;
    background: var(--accent); color: #fff; text-decoration: none;
    border-radius: 6px; font-size: 12px; font-weight: 600;
  }
  .pop-link:hover { background: var(--accent-2); }

  .leaflet-control-attribution { font-size: 10px; }

  @media (max-width: 600px) {
    header.topbar { padding: 10px 14px; flex-wrap: wrap; gap: 8px; }
    .title-block h1 { font-size: 15px; }
    .stat .num { font-size: 18px; }
    .progress-bar { width: 100px; }
    .controls { padding: 6px 14px; }
  }
</style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="title-block">
      <h1>🌊 日本の滝マップ</h1>
      <div class="sub">visited / total — クリックで詳細</div>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="num"><span id="visited-count">0</span> / <span class="total" id="total-count">0</span></div>
        <div class="lbl">VISITED</div>
      </div>
      <div class="progress-bar"><div class="fill" id="progress-fill" style="width:0%"></div></div>
    </div>
  </header>

  <div class="controls">
    <button class="filter-btn active" data-filter="all">すべて</button>
    <button class="filter-btn" data-filter="visited">行った（赤）</button>
    <button class="filter-btn" data-filter="unvisited">未訪問（灰）</button>
  </div>

  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
(async function() {
  const res = await fetch('data.json?v=' + Date.now());
  const data = await res.json();
  const falls = data.falls;

  const total = falls.length;
  const visitedCount = falls.filter(f => f.visited).length;
  document.getElementById('visited-count').textContent = visitedCount;
  document.getElementById('total-count').textContent = total;
  document.getElementById('progress-fill').style.width = (visitedCount / total * 100) + '%';

  const map = L.map('map', {
    center: [36.5, 137.5],
    zoom: 5,
    minZoom: 4,
    maxZoom: 15,
    zoomControl: true,
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(map);

  const visitedLayer = L.layerGroup().addTo(map);
  const unvisitedLayer = L.layerGroup().addTo(map);

  function createIcon(visited) {
    return L.divIcon({
      className: '',
      html: `<div class="pin ${visited ? 'visited' : 'unvisited'}">${visited ? '✓' : ''}</div>`,
      iconSize: [22, 22],
      iconAnchor: [11, 11],
    });
  }

  function buildPopup(f) {
    const status = f.visited
      ? '<span class="pop-status visited">行った</span>'
      : '<span class="pop-status unvisited">未訪問</span>';
    const date = f.visited && f.visitDate
      ? `<div class="pop-date">📅 ${f.visitDate}</div>`
      : '';
    const img = f.imageUrl
      ? `<img class="pop-img" src="${f.imageUrl}" alt="${f.name}" loading="lazy" onerror="this.style.display='none'" />`
      : '';
    return `
      <div class="pop-title">${f.name}</div>
      <div class="pop-pref">${f.pref}</div>
      ${status}
      ${date}
      ${img}
      <a class="pop-link" href="${f.notionUrl}" target="_blank" rel="noopener">Notionで詳細を見る →</a>
    `;
  }

  falls.forEach(f => {
    const marker = L.marker([f.lat, f.lng], { icon: createIcon(f.visited) });
    marker.bindPopup(buildPopup(f), { maxWidth: 280 });
    if (f.visited) {
      marker.addTo(visitedLayer);
    } else {
      marker.addTo(unvisitedLayer);
    }
  });

  // フィルタ切り替え
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const f = btn.dataset.filter;
      if (f === 'all') {
        map.addLayer(visitedLayer);
        map.addLayer(unvisitedLayer);
      } else if (f === 'visited') {
        map.addLayer(visitedLayer);
        map.removeLayer(unvisitedLayer);
      } else {
        map.removeLayer(visitedLayer);
        map.addLayer(unvisitedLayer);
      }
    });
  });
})();
</script>
</body>
</html>
