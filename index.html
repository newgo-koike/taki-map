<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
<title>日本の滝マップ｜小池雄悟</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<style>
  :root {
    --bg: #0f1419;
    --panel: #1a2028;
    --panel-2: #232b36;
    --text: #e8edf2;
    --text-dim: #8a96a6;
    --accent: #ff5252;
    --accent-2: #ff8a80;
    --gray: #6b7785;
    --border: #2c3540;
    --ok: #5fd17a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; background: var(--bg); color: var(--text); }
  #app { display: flex; flex-direction: column; height: 100vh; }

  header.topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px; background: var(--panel);
    border-bottom: 1px solid var(--border); z-index: 1000;
  }
  .title-block h1 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: 0.02em; }
  .title-block .sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .stats { display: flex; gap: 16px; align-items: center; }
  .stat { text-align: right; }
  .stat .num { font-size: 22px; font-weight: 700; color: var(--accent); line-height: 1; }
  .stat .num.total { color: var(--text); }
  .stat .lbl { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
  .progress-bar { width: 160px; height: 6px; background: var(--panel-2); border-radius: 3px; overflow: hidden; }
  .progress-bar .fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); transition: width 0.4s ease; }

  .controls {
    display: flex; gap: 8px; padding: 8px 20px; align-items: center;
    background: var(--panel-2); border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  .filter-btn {
    background: transparent; border: 1px solid var(--border); color: var(--text-dim);
    padding: 6px 14px; border-radius: 16px; font-size: 12px; cursor: pointer;
    white-space: nowrap; transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  .sync-status { margin-left: auto; font-size: 11px; color: var(--text-dim); }
  .sync-status.ok { color: var(--ok); }
  .sync-status.err { color: var(--accent); }

  #map { flex: 1; background: var(--panel); }

  /* ピンスタイル */
  .pin {
    width: 22px; height: 22px; border-radius: 50%;
    border: 3px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 11px; font-weight: 700;
    transition: transform 0.15s;
  }
  .pin.visited { background: var(--accent); }
  .pin.unvisited { background: var(--gray); opacity: 0.7; }
  .pin.unvisited:hover { opacity: 1; transform: scale(1.15); }
  .pin.visited:hover { transform: scale(1.15); }

  /* ポップアップ */
  .leaflet-popup-content-wrapper {
    background: var(--panel); color: var(--text);
    border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .leaflet-popup-tip { background: var(--panel); }
  .leaflet-popup-content { margin: 14px 16px; min-width: 240px; }
  .pop-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .pop-pref { font-size: 11px; color: var(--text-dim); margin-bottom: 10px; }
  .pop-status { display: inline-block; padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; margin-bottom: 10px; }
  .pop-status.visited { background: var(--accent); color: #fff; }
  .pop-status.unvisited { background: var(--panel-2); color: var(--text-dim); }
  .pop-date { font-size: 11px; color: var(--ok); margin-bottom: 10px; }
  .pop-img { width: 100%; max-height: 140px; object-fit: cover; border-radius: 6px; margin-bottom: 10px; }
  .pop-actions { display: flex; gap: 6px; flex-direction: column; }
  .pop-btn {
    display: block; text-align: center; padding: 8px;
    text-decoration: none; border-radius: 6px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    border: none; transition: all 0.15s;
  }
  .pop-btn.primary { background: var(--accent); color: #fff; }
  .pop-btn.primary:hover { background: var(--accent-2); }
  .pop-btn.primary:disabled { opacity: 0.5; cursor: wait; }
  .pop-btn.secondary { background: var(--panel-2); color: var(--text-dim); border: 1px solid var(--border); }
  .pop-btn.secondary:hover { color: var(--text); border-color: var(--accent); }
  .pop-btn.ghost {
    background: transparent; color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .pop-btn.ghost:hover { color: var(--text); border-color: var(--accent); }

  .leaflet-control-attribution { font-size: 10px; }

  .loading-overlay {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999; flex-direction: column; gap: 12px;
  }
  .spinner {
    width: 40px; height: 40px; border: 3px solid var(--panel-2);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    header.topbar { padding: 10px 14px; flex-wrap: wrap; gap: 8px; }
    .title-block h1 { font-size: 15px; }
    .stat .num { font-size: 18px; }
    .progress-bar { width: 100px; }
    .controls { padding: 6px 14px; }
  }
</style>
</head>
<body>
<div id="loading" class="loading-overlay">
  <div class="spinner"></div>
  <div style="font-size: 13px; color: var(--text-dim);">Notionから滝データを読み込んでいます…</div>
</div>

<div id="app">
  <header class="topbar">
    <div class="title-block">
      <h1>🌊 日本の滝マップ</h1>
      <div class="sub">クリックして「行った！」を記録 → Notionに自動同期</div>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="num"><span id="visited-count">0</span> / <span class="total" id="total-count">0</span></div>
        <div class="lbl">VISITED</div>
      </div>
      <div class="progress-bar"><div class="fill" id="progress-fill" style="width:0%"></div></div>
    </div>
  </header>

  <div class="controls">
    <button class="filter-btn active" data-filter="all">すべて</button>
    <button class="filter-btn" data-filter="visited">行った（赤）</button>
    <button class="filter-btn" data-filter="unvisited">未訪問（灰）</button>
    <span class="sync-status" id="sync-status">●</span>
  </div>

  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
const API_URL = 'https://taki-map-api.newgo-koike.workers.dev/api';

const state = {
  falls: [],
  byId: new Map(),
  markers: new Map(),
  map: null,
  visitedLayer: null,
  unvisitedLayer: null,
};

function setSync(text, cls) {
  const el = document.getElementById('sync-status');
  el.textContent = text;
  el.className = 'sync-status ' + (cls || '');
}

function updateStats() {
  const total = state.falls.length;
  const visited = state.falls.filter(f => f.visited).length;
  document.getElementById('visited-count').textContent = visited;
  document.getElementById('total-count').textContent = total;
  document.getElementById('progress-fill').style.width = (total ? visited / total * 100 : 0) + '%';
}

function createIcon(visited) {
  return L.divIcon({
    className: '',
    html: `<div class="pin ${visited ? 'visited' : 'unvisited'}">${visited ? '✓' : ''}</div>`,
    iconSize: [22, 22],
    iconAnchor: [11, 11],
  });
}

function buildPopup(f) {
  const wrap = document.createElement('div');
  const status = f.visited
    ? '<span class="pop-status visited">行った</span>'
    : '<span class="pop-status unvisited">未訪問</span>';
  const date = f.visited && f.visitDate
    ? `<div class="pop-date">📅 ${f.visitDate}</div>`
    : '';
  const img = f.imageUrl
    ? `<img class="pop-img" src="${f.imageUrl}" alt="${f.name}" loading="lazy" onerror="this.style.display='none'" />`
    : '';
  wrap.innerHTML = `
    <div class="pop-title">${f.name}</div>
    <div class="pop-pref">${f.pref || ''}</div>
    ${status}
    ${date}
    ${img}
    <div class="pop-actions">
      <button class="pop-btn primary" data-action="toggle">${f.visited ? '未訪問に戻す' : '🎉 行った！'}</button>
      <a class="pop-btn ghost" href="${f.notionUrl}" target="_blank" rel="noopener">Notionで詳細を見る</a>
    </div>
  `;
  wrap.querySelector('[data-action="toggle"]').addEventListener('click', async (e) => {
    const btn = e.currentTarget;
    btn.disabled = true;
    btn.textContent = '更新中…';
    setSync('● 同期中...', '');
    try {
      const action = f.visited ? 'unvisit' : 'visit';
      const res = await fetch(`${API_URL}/falls/${f.id}/${action}`, { method: 'POST' });
      const result = await res.json();
      if (!result.ok) throw new Error(result.error || 'failed');
      f.visited = result.visited;
      f.visitDate = result.visitDate;
      replaceMarker(f);
      updateStats();
      setSync('✓ 同期OK', 'ok');
      state.map.closePopup();
    } catch (err) {
      console.error(err);
      btn.disabled = false;
      btn.textContent = '失敗・もう一度';
      setSync('⚠ 同期失敗', 'err');
    }
  });
  return wrap;
}

function replaceMarker(f) {
  const old = state.markers.get(f.id);
  if (old) {
    state.visitedLayer.removeLayer(old);
    state.unvisitedLayer.removeLayer(old);
  }
  const marker = L.marker([f.lat, f.lng], { icon: createIcon(f.visited) });
  marker.bindPopup(() => buildPopup(f), { maxWidth: 280 });
  if (f.visited) marker.addTo(state.visitedLayer);
  else marker.addTo(state.unvisitedLayer);
  state.markers.set(f.id, marker);
}

async function loadFalls() {
  const res = await fetch(`${API_URL}/falls`, { cache: 'no-store' });
  if (!res.ok) throw new Error('API ' + res.status);
  return await res.json();
}

(async function() {
  try {
    setSync('● 読み込み中...', '');
    const data = await loadFalls();
    state.falls = data.falls.filter(f => f.lat != null && f.lng != null);
    state.falls.forEach(f => state.byId.set(f.id, f));

    state.map = L.map('map', {
      center: [36.5, 137.5],
      zoom: 5,
      minZoom: 4,
      maxZoom: 15,
      zoomControl: true,
    });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap &copy; CARTO',
      subdomains: 'abcd',
      maxZoom: 19,
    }).addTo(state.map);

    state.visitedLayer = L.layerGroup().addTo(state.map);
    state.unvisitedLayer = L.layerGroup().addTo(state.map);

    state.falls.forEach(f => replaceMarker(f));
    updateStats();
    setSync('✓ Notion接続', 'ok');
    document.getElementById('loading').style.display = 'none';

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const f = btn.dataset.filter;
        if (f === 'all') {
          state.map.addLayer(state.visitedLayer);
          state.map.addLayer(state.unvisitedLayer);
        } else if (f === 'visited') {
          state.map.addLayer(state.visitedLayer);
          state.map.removeLayer(state.unvisitedLayer);
        } else {
          state.map.removeLayer(state.visitedLayer);
          state.map.addLayer(state.unvisitedLayer);
        }
      });
    });
  } catch (err) {
    console.error(err);
    document.getElementById('loading').innerHTML = `
      <div style="text-align: center;">
        <div style="font-size: 14px; color: var(--accent); margin-bottom: 8px;">読み込みに失敗しました</div>
        <div style="font-size: 11px; color: var(--text-dim);">${err.message || err}</div>
        <button onclick="location.reload()" style="margin-top: 16px; padding: 8px 16px; background: var(--accent); color: #fff; border: none; border-radius: 6px; cursor: pointer;">リトライ</button>
      </div>
    `;
  }
})();
</script>
</body>
</html>
